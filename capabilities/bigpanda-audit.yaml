naftiko: 1.0.0-alpha2
info:
  label: BigPanda API — Audit
  description: 'BigPanda API — Audit. 1 operations. Lead operation: BigPanda Get Audit Logs. Self-contained Naftiko capability
    covering one Bigpanda business surface.'
  tags:
  - Bigpanda
  - Audit
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BIGPANDA_API_KEY: BIGPANDA_API_KEY
capability:
  consumes:
  - type: http
    namespace: bigpanda-audit
    baseUri: https://api.bigpanda.io
    description: BigPanda API — Audit business capability. Self-contained, no shared references.
    resources:
    - name: resources-v2.0-audit-logs
      path: /resources/v2.0/audit/logs
      operations:
      - name: getauditlogs
        method: GET
        description: BigPanda Get Audit Logs
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: from
          in: query
          type: integer
          description: Start timestamp for log query.
        - name: to
          in: query
          type: integer
          description: End timestamp for log query.
    authentication:
      type: bearer
      token: '{{env.BIGPANDA_API_KEY}}'
  exposes:
  - type: rest
    namespace: bigpanda-audit-rest
    port: 8080
    description: REST adapter for BigPanda API — Audit. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/resources/v2-0/audit/logs
      name: resources-v2-0-audit-logs
      description: REST surface for resources-v2.0-audit-logs.
      operations:
      - method: GET
        name: getauditlogs
        description: BigPanda Get Audit Logs
        call: bigpanda-audit.getauditlogs
        with:
          from: rest.from
          to: rest.to
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bigpanda-audit-mcp
    port: 9090
    transport: http
    description: MCP adapter for BigPanda API — Audit. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: bigpanda-get-audit-logs
      description: BigPanda Get Audit Logs
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bigpanda-audit.getauditlogs
      with:
        from: tools.from
        to: tools.to
      outputParameters:
      - type: object
        mapping: $.
