naftiko: 1.0.0-alpha2
info:
  label: BigPanda API — Incidents
  description: 'BigPanda API — Incidents. 2 operations. Lead operation: BigPanda List Incidents. Self-contained Naftiko capability
    covering one Bigpanda business surface.'
  tags:
  - Bigpanda
  - Incidents
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    BIGPANDA_API_KEY: BIGPANDA_API_KEY
capability:
  consumes:
  - type: http
    namespace: bigpanda-incidents
    baseUri: https://api.bigpanda.io
    description: BigPanda API — Incidents business capability. Self-contained, no shared references.
    resources:
    - name: resources-v2.0-environments-environment_id-incidents
      path: /resources/v2.0/environments/{environment_id}/incidents
      operations:
      - name: listincidents
        method: GET
        description: BigPanda List Incidents
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: environment_id
          in: path
          type: string
          required: true
        - name: active
          in: query
          type: boolean
          description: Filter by active incidents.
    - name: resources-v2.0-environments-environment_id-incidents-incident_id
      path: /resources/v2.0/environments/{environment_id}/incidents/{incident_id}
      operations:
      - name: getincident
        method: GET
        description: BigPanda Get Incident
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: environment_id
          in: path
          type: string
          required: true
        - name: incident_id
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.BIGPANDA_API_KEY}}'
  exposes:
  - type: rest
    namespace: bigpanda-incidents-rest
    port: 8080
    description: REST adapter for BigPanda API — Incidents. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/resources/v2-0/environments/{environment-id}/incidents
      name: resources-v2-0-environments-environment-id-incidents
      description: REST surface for resources-v2.0-environments-environment_id-incidents.
      operations:
      - method: GET
        name: listincidents
        description: BigPanda List Incidents
        call: bigpanda-incidents.listincidents
        with:
          environment_id: rest.environment_id
          active: rest.active
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/resources/v2-0/environments/{environment-id}/incidents/{incident-id}
      name: resources-v2-0-environments-environment-id-incidents-incident-id
      description: REST surface for resources-v2.0-environments-environment_id-incidents-incident_id.
      operations:
      - method: GET
        name: getincident
        description: BigPanda Get Incident
        call: bigpanda-incidents.getincident
        with:
          environment_id: rest.environment_id
          incident_id: rest.incident_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bigpanda-incidents-mcp
    port: 9090
    transport: http
    description: MCP adapter for BigPanda API — Incidents. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: bigpanda-list-incidents
      description: BigPanda List Incidents
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bigpanda-incidents.listincidents
      with:
        environment_id: tools.environment_id
        active: tools.active
      outputParameters:
      - type: object
        mapping: $.
    - name: bigpanda-get-incident
      description: BigPanda Get Incident
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: bigpanda-incidents.getincident
      with:
        environment_id: tools.environment_id
        incident_id: tools.incident_id
      outputParameters:
      - type: object
        mapping: $.
